<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a1a"/>
  <!-- Microphone head -->
  <rect x="22" y="12" width="20" height="26" rx="10" fill="url(#g)"/>
  <!-- Microphone grille lines -->
  <line x1="26" y1="18" x2="38" y2="18" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="26" y1="22" x2="38" y2="22" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="26" y1="26" x2="38" y2="26" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="26" y1="30" x2="38" y2="30" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <!-- Microphone arc -->
  <path d="M18 32 A14 14 0 0 0 46 32" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <!-- Microphone stand -->
  <line x1="32" y1="46" x2="32" y2="52" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <line x1="25" y1="52" x2="39" y2="52" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <!-- Music notes -->
  <g fill="#93c5fd" opacity="0.7">
    <circle cx="49" cy="14" r="2.5"/>
    <rect x="51" y="6" width="1.5" height="8"/>
    <path d="M51.5 6 Q55 4 52.5 9" stroke="#93c5fd" fill="none" stroke-width="1.2"/>
  </g>
  <g fill="#93c5fd" opacity="0.5">
    <circle cx="13" cy="20" r="2"/>
    <rect x="14.5" y="13" width="1.2" height="7"/>
    <path d="M15 13 Q18 11.5 16 15.5" stroke="#93c5fd" fill="none" stroke-width="1"/>
  </g>
</svg>
